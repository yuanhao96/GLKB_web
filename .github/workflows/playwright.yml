name: Playwright Tests
on:
  schedule:
    - cron: '0 * * * *'  # Every hour

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://dev.glkb.org
      TEST_TOKEN: ${{ secrets.PLAYWRIGHT_TEST_TOKEN }}
      AMPLIFY_USERNAME: ${{ secrets.AMPLIFY_USERNAME }}
      AMPLIFY_PASSWORD: ${{ secrets.AMPLIFY_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      run: PLAYWRIGHT_JSON_OUTPUT_NAME=playwright-results.json npx playwright test --reporter=json,html
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Send classified failure notifications
      if: failure()
      env:
        MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        NOTIFY_ALERT_EMAIL: ${{ secrets.NOTIFY_ALERT_EMAIL }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: node e2e/scripts/notify.js
